server:
  address: ${APP_HOST:0.0.0.0}
  port: ${APP_PORT:8080}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false
    include-web-company-name: false
    include-server-name: false

spring:
  application:
    name: onepage-backend

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:onepage}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: OnepageHikariCP
      connection-test-query: SELECT 1
      validation-timeout: 5000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  cache:
    type: redis
    redis:
      time-to-live: 86400000
      cache-null-values: false

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  mail:
    host: smtp.sendgrid.net
    port: 587
    username: apikey
    password: ${SENDGRID_API_KEY:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        from: ${MAIL_FROM:noreply@vibeonepage.com}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  from-number: ${TWILIO_FROM_NUMBER:}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  ai:
    openai:
      api-key: ${MINIMAX_API_KEY:}
      base-url: https://api.minimax.io/v1
      chat:
        options:
          model: MiniMax-M2.7

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.onepage.model
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: ${JWT_SECRET:onepage-dev-secret-key-change-in-production-32chars}
  expiration: ${JWT_EXPIRATION:604800000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:2592000000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5175,http://localhost:3000}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS,PATCH}

upload:
  path: ${UPLOAD_PATH:./uploads}

minimax:
  api:
    key: ${MINIMAX_API_KEY:}

credit:
  packages: '[{"credits":10,"price":10.00,"name":"10 Credits"},{"credits":50,"price":45.00,"name":"50 Credits (10% off)"},{"credits":100,"price":80.00,"name":"100 Credits (20% off)"}]'

hosting:
  base-domain: ${HOSTING_BASE_DOMAIN:localhost:8080}
  use-subdomain: ${HOSTING_USE_SUBDOMAIN:true}
  environment: ${HOSTING_ENV:dev}

logging:
  level:
    com.onepage: debug

app:
  base-url: ${APP_BASE_URL:http://localhost:5173}
