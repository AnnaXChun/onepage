<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO Meta Tags -->
    <title th:text="${metaTitle}">Blog Title</title>
    <meta name="description" th:content="${metaDescription}" content="">

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" th:content="${metaTitle}" content="Default Title">
    <meta property="og:description" th:content="${metaDescription}" content="">
    <meta property="og:image" th:if="${ogImage != null and ogImage != ''}" th:content="${ogImage}" content="">
    <meta property="og:url" th:content="${siteUrl} + '/host/' + ${username}" content="http://localhost:8080">
    <meta property="og:type" content="website">

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" th:content="${metaTitle}" content="Default Title">
    <meta name="twitter:description" th:content="${metaDescription}" content="">
    <meta name="twitter:image" th:if="${ogImage != null and ogImage != ''}" th:content="${ogImage}" content="">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            background-color: #0a0a0f;
            color: #e5e5e5;
            line-height: 1.6;
        }
        .cover-image {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 2rem;
        }
        .block {
            margin-bottom: 1.5rem;
        }
        .text-h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #f5f5f7;
            margin-bottom: 1rem;
        }
        .text-h2 {
            font-size: 1.875rem;
            font-weight: 600;
            color: #f5f5f7;
            margin-bottom: 0.75rem;
        }
        .text-paragraph {
            font-size: 1.125rem;
            line-height: 1.75;
            color: #d1d1d6;
        }
        .text-list {
            padding-left: 1.5rem;
            font-size: 1.125rem;
            line-height: 1.75;
            color: #d1d1d6;
        }
        .text-list li {
            margin-bottom: 0.5rem;
        }
        .image-block {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
        }
        .social-links {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .social-links a {
            color: #8b5cf6;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            background: rgba(139, 92, 246, 0.1);
            transition: background 0.2s;
        }
        .social-links a:hover {
            background: rgba(139, 92, 246, 0.2);
        }
        .contact-form {
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .divider {
            border: 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin: 2rem 0;
        }
        header {
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <article th:if="${coverImage != null and coverImage != ''}">
        <img th:src="${coverImage}" class="cover-image" alt="Cover" />
    </article>
    <header>
        <h1 th:text="${title}" class="text-h1">Title</h1>
    </header>
    <div th:each="block : ${blocks}" class="block">
        <th:block th:switch="${block.type}">
            <th:block th:case="'text-h1'">
                <th:replace th:replace="~{static-site/blocks/text-block :: text-block (block=${block})}" />
            </th:block>
            <th:block th:case="'text-h2'">
                <th:replace th:replace="~{static-site/blocks/text-block :: text-block (block=${block})}" />
            </th:block>
            <th:block th:case="'text-paragraph'">
                <th:replace th:replace="~{static-site/blocks/text-block :: text-block (block=${block})}" />
            </th:block>
            <th:block th:case="'text-list'">
                <th:replace th:replace="~{static-site/blocks/text-block :: text-block (block=${block})}" />
            </th:block>
            <th:block th:case="'image'">
                <th:replace th:replace="~{static-site/blocks/image-block :: image-block (block=${block})}" />
            </th:block>
            <th:block th:case="'social-links'">
                <th:replace th:replace="~{static-site/blocks/social-links-block :: social-links-block (block=${block})}" />
            </th:block>
            <th:block th:case="'contact-form'">
                <th:replace th:replace="~{static-site/blocks/contact-form-block :: contact-form-block (block=${block})}" />
            </th:block>
            <th:block th:case="'divider'">
                <th:replace th:replace="~{static-site/blocks/divider-block :: divider-block (block=${block})}" />
            </th:block>
        </th:block>
    </div>
</body>
</html>
