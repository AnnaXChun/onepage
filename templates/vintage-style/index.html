<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{USER_NAME}} - 复古日志</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="vintage-bg"></div>
    <div class="paper-texture"></div>

    <div class="container">
        <header class="header">
            <div class="avatar-wrapper">
                <img src="{{USER_IMAGE}}" alt="{{USER_NAME}}" class="avatar">
            </div>
            <h1 class="name">{{USER_NAME}}</h1>
            <p class="bio">{{USER_BIO}}</p>
            <div class="divider">❧ ❦ ❧</div>
        </header>

        <main class="content">
            {{BLOG_CONTENT}}
        </main>

        <footer class="footer">
            <p>✦ 致谢您的阅读 ✦</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
