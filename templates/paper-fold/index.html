<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{USER_NAME}} - 博客</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="paper-texture"></div>

    <div class="container">
        <header class="header">
            <div class="fold-corner top-right"></div>
            <div class="profile-card">
                <div class="image-wrapper">
                    <img src="{{USER_IMAGE}}" alt="{{USER_NAME}}" class="profile-image">
                    <div class="fold-shadow"></div>
                </div>
                <div class="profile-info">
                    <h1 class="name">{{USER_NAME}}</h1>
                    <p class="bio">{{USER_BIO}}</p>
                    <div class="decorative-line"></div>
                </div>
            </div>
        </header>

        <main class="content">
            <div class="fold-corner top-left"></div>
            {{BLOG_CONTENT}}
            <div class="fold-corner bottom-right"></div>
        </main>

        <footer class="footer">
            <div class="stamp">
                <span>CRAFTED</span>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
