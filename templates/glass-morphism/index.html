<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{USER_NAME}} - 博客</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container">
        <header class="header">
            <div class="glass-card profile-card">
                <div class="avatar-container">
                    <img src="{{USER_IMAGE}}" alt="{{USER_NAME}}" class="avatar">
                    <div class="avatar-glow"></div>
                </div>
                <div class="profile-content">
                    <h1 class="name">{{USER_NAME}}</h1>
                    <p class="bio">{{USER_BIO}}</p>
                    <div class="stats">
                        <div class="stat">
                            <span class="stat-value">✨</span>
                            <span class="stat-label">创作者</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="content">
            {{BLOG_CONTENT}}
        </main>

        <footer class="footer">
            <div class="glass-card footer-card">
                <p>Made with passion</p>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
