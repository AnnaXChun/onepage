<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{USER_NAME}} - 博客</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

        <aside class="sidebar">

        <main class="content">
            {{BLOG_CONTENT}}
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
